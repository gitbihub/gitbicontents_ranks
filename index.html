<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>alttab creative</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-bg"></div>
    <main class="ticket-page">
      <header class="hero">
        <nav class="top-nav">
          <div class="brand">alttab</div>
          <button class="menu-btn" aria-label="메뉴 열기">MENU</button>
          <ul class="menu-list">
            <li><a href="#tickets">work</a></li>
            <li><a href="#payment">about</a></li>
            <li><a href="#rules">contact</a></li>
          </ul>
        </nav>

        <div class="hero-media">
          <img
            src="./hero-reel.gif"
            alt="REEL 하이라이트"
          />
          <div class="hero-overlay"></div>
          <h1><span>alttab</span> creative</h1>
        </div>
      </header>

      <section id="tickets" class="section">
        <h2 class="work-title">WORK</h2>
        <div class="ticket-grid">
          <a
            class="ticket-card ticket-link"
            href="./ticket-1.html"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="1 CLASS 티켓 상세 열기"
          >
            <h3>CONCERT & SHOW</h3>
          </a>
          <a
            class="ticket-card ticket-link"
            href="./ticket-2.html"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="10 CLASSES 티켓 상세 열기"
          >
            <h3>TV & BROADCAST</h3>
          </a>
          <a
            class="ticket-card ticket-link active"
            href="./ticket-3.html"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="20 CLASSES 티켓 상세 열기"
          >
            <h3>CAMERA LIVE</h3>
          </a>
          <a
            class="ticket-card ticket-link"
            href="./ticket-4.html"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="40 CLASSES 티켓 상세 열기"
          >
            <h3>AI</h3>
          </a>
        </div>
      </section>

      <section id="payment" class="section studio-layout">
        <div class="studio-line marquee scroll-ltr">
          <div class="marquee-track">
            <span class="serif white">The</span>
            <div class="pill-card blue">
              <img
                src="https://images.unsplash.com/photo-1485462537746-965f33f7f6a7?auto=format&fit=crop&w=700&q=80"
                alt="크리에이터"
              />
            </div>
            <span class="sans pink">Ultimate</span>
            <span class="serif white">Video</span>
          </div>
        </div>

        <div class="studio-line marquee scroll-rtl">
          <div class="marquee-track">
            <span class="sans blue">Production</span>
            <div class="pill-card yellow">
              <img
                src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1?auto=format&fit=crop&w=700&q=80"
                alt="아티스트"
              />
            </div>
            <span class="serif white">Studio</span>
          </div>
        </div>

        <div class="studio-line marquee scroll-ltr">
          <div class="marquee-track">
            <span class="serif white">for</span>
            <div class="pill-card pink">
              <img
                src="https://images.unsplash.com/photo-1517841905240-472988babdf9?auto=format&fit=crop&w=700&q=80"
                alt="댄서"
              />
            </div>
            <span class="sans green">Outstanding</span>
          </div>
        </div>

        <div id="rules" class="studio-line final marquee scroll-rtl">
          <div class="marquee-track">
            <span class="sans yellow">Artists!</span>
            <div class="pill-card cloud">
              <img
                src="https://images.unsplash.com/photo-1521572267360-ee0c2909d518?auto=format&fit=crop&w=900&q=80"
                alt="팀 소개"
              />
            </div>
            <span class="serif white">Join</span>
            <span class="sans green">Our</span>
            <span class="serif white">Classes</span>
          </div>
        </div>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
